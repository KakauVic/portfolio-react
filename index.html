<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página Simples</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background: #333;
            color: #fff;
            padding: 1rem;
            text-align: center;
        }
        main {
            padding: 2rem;
            flex: 1;
            max-width: 800px;
            margin: auto;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        footer {
            text-align: center;
            padding: 1rem;
            background: #333;
            color: #fff;
            margin-top: auto;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bem-vindo ao Meu Site</h1>
    </header>

    <main>
        <h2>Sobre esta página</h2>
        <p>Esta é uma estrutura HTML básica. Ela contém um cabeçalho, uma área de conteúdo principal e um rodapé.</p>
        
        <ul>
            <li>HTML5 Estrutural</li>
            <li>CSS para estilização básica</li>
            <li>Design Responsivo</li>
        </ul>

        <button onclick="alert('Olá! Você clicou no botão.')">Clique aqui</button>
    </main>

    <footer>
        <p>&copy; 2026 - Criado com Gemini</p>
    </footer>

</body>
</html>
